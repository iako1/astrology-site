<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="site-title-tag">ასტროლოგია — ზოდიაქო</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efeb;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9a9994;
  --border:#e5e4de;--border2:#d0cfc8;
  --r:10px;--rl:14px;
  --fire-bg:#FAECE7;--fire-tc:#712B13;--fire-bc:#D85A30;
  --earth-bg:#EAF3DE;--earth-tc:#27500A;--earth-bc:#639922;
  --air-bg:#E6F1FB;--air-tc:#0C447C;--air-bc:#378ADD;
  --water-bg:#EEEDFE;--water-tc:#3C3489;--water-bc:#7F77DD;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
  --text:#f0efeb;--text2:#a8a79f;--text3:#6b6b67;
  --border:#3a3a36;--border2:#4a4a45;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
/* header */
.site-header{background:var(--bg);border-bottom:.5px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hdr h1{font-size:17px;font-weight:500;color:var(--text)}
.hdr p{font-size:12px;color:var(--text2);margin-top:1px}
.admin-btn{font-size:12px;padding:5px 12px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
/* tabs */
.tabs{display:flex;gap:0;overflow-x:auto;background:var(--bg);border-bottom:.5px solid var(--border)}
.tab{padding:10px 16px;border:none;background:none;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;flex-shrink:0}
.tab.on{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.wrap{max-width:880px;margin:0 auto;padding:22px 14px}
.page{display:none}.page.on{display:block}
/* cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px;margin-bottom:20px}
.scard{border:.5px solid var(--border);border-radius:var(--rl);padding:13px;cursor:pointer;background:var(--bg);transition:border-color .15s,background .15s}
.scard:hover,.scard.on{border-color:var(--border2);background:var(--bg2)}
.scard.on{border-width:1px}
.epill{font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:5px;font-weight:500;border:.5px solid}
/* detail */
.dpanel{border:.5px solid var(--border2);border-radius:var(--rl);padding:20px;background:var(--bg);margin-top:4px}
.dhero{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;padding-bottom:14px;border-bottom:.5px solid var(--border)}
.dclose{margin-left:auto;background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;padding:4px;line-height:1}
.prow{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:7px;margin-bottom:14px}
.pc{background:var(--bg2);border-radius:var(--r);padding:9px 11px}
.pl{font-size:10px;color:var(--text3);margin-bottom:2px}
.pv{font-size:13px;font-weight:500;color:var(--text)}
.kws{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.kw{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--bg2);border:.5px solid var(--border);color:var(--text2)}
.slbl{font-size:11px;font-weight:500;color:var(--text3);margin:12px 0 6px}
/* generic section types */
.sec-article{margin-bottom:24px}
.sec-article h2{font-size:18px;font-weight:500;color:var(--text);margin-bottom:10px}
.sec-article p{font-size:14px;color:var(--text2);line-height:1.75}
.sec-grid-wrap{margin-bottom:24px}
.sec-grid-wrap h2{font-size:18px;font-weight:500;color:var(--text);margin-bottom:12px}
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px}
.sec-card{border:.5px solid var(--border);border-radius:var(--rl);padding:14px;background:var(--bg)}
.sec-table-wrap{margin-bottom:24px;overflow-x:auto}
.sec-table-wrap h2{font-size:18px;font-weight:500;color:var(--text);margin-bottom:10px}
.sec-table{width:100%;border-collapse:collapse;font-size:13px;border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.sec-table th{padding:9px 11px;background:var(--bg2);text-align:left;font-size:11px;font-weight:500;color:var(--text3);border-bottom:.5px solid var(--border)}
.sec-table td{padding:9px 11px;border-bottom:.5px solid var(--border);color:var(--text2)}
.sec-table tr:last-child td{border-bottom:none}
.sec-signs-wrap{margin-bottom:24px}
.sec-signs-wrap h2{font-size:18px;font-weight:500;color:var(--text);margin-bottom:10px}
.hier-lbl{font-size:11px;font-weight:500;color:var(--text3);margin:10px 0 7px;letter-spacing:.04em}
/* table page */
.tbl-outer{overflow-x:auto;border-radius:var(--rl);border:.5px solid var(--border);background:var(--bg)}
table.main-tbl{width:100%;border-collapse:collapse;font-size:13px}
table.main-tbl thead th{padding:9px 11px;text-align:left;font-size:11px;font-weight:500;color:var(--text3);border-bottom:.5px solid var(--border);white-space:nowrap;background:var(--bg2)}
table.main-tbl tbody td{padding:9px 11px;border-bottom:.5px solid var(--border);vertical-align:top}
table.main-tbl tbody tr:last-child td{border-bottom:none}
table.main-tbl tbody tr:hover td{background:var(--bg2)}
table.main-tbl tbody tr.upper td{background:var(--bg2)}
.rx{font-size:9px;font-weight:700;color:#A32D2D;background:#FCEBEB;border-radius:4px;padding:0 3px;line-height:15px;display:inline-block}
.ast{font-size:9px;font-weight:700;color:#3C3489;background:#EEEDFE;border-radius:4px;padding:0 3px;line-height:15px;display:inline-block}
.pi{display:flex;align-items:center;gap:4px;white-space:nowrap;margin-bottom:3px}
/* calc */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:26px}
@media(max-width:580px){.cgrid{grid-template-columns:1fr}}
.prow2{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--border);margin-bottom:5px;background:var(--bg2)}
.psym{font-size:17px;width:24px;text-align:center}
.pname{font-size:13px;font-weight:500;color:var(--text);flex:1}
.psel{font-size:12px;border:.5px solid var(--border2);border-radius:6px;padding:4px 6px;background:var(--bg);color:var(--text);flex:1.5;max-width:145px}
.ppts{font-size:11px;color:var(--text3);width:34px;text-align:right}
.cbtn{width:100%;padding:10px;margin-top:7px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:var(--text);color:var(--bg)}
.rcard{border:.5px solid var(--border);border-radius:var(--rl);padding:13px;background:var(--bg);margin-bottom:8px}
.bwrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:4px}
.bfill{height:100%;border-radius:4px;transition:width .5s}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.ins{border-radius:var(--r);padding:11px 13px;margin-top:7px;font-size:13px;line-height:1.65;border:.5px solid}
/* ===== ADMIN ===== */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-start;justify-content:center;padding:12px;overflow-y:auto}
.moverlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);padding:20px;width:100%;max-width:640px;margin:auto;border:.5px solid var(--border2)}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-h h2{font-size:15px;font-weight:500;color:var(--text)}
.mclose{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:11px;font-weight:500;color:var(--text3);margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;padding:7px 9px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit}
.fg textarea{resize:vertical;min-height:72px}
.sbtn{width:100%;padding:9px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;background:var(--text);color:var(--bg);margin-top:5px}
.sbtn:hover{opacity:.85}
.sbtn.sec{background:var(--bg2);color:var(--text);border:.5px solid var(--border2);margin-top:0}
.atabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.atab{padding:5px 12px;border:.5px solid var(--border);border-radius:14px;font-size:12px;cursor:pointer;background:var(--bg2);color:var(--text2)}
.atab.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.svbadge{display:none;font-size:11px;color:#27500A;background:#EAF3DE;padding:2px 8px;border-radius:7px;margin-left:7px}
.lbox{max-width:280px;margin:0 auto;padding:24px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.asl{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:5px;margin-bottom:12px}
.asb{padding:7px;border:.5px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);font-size:12px;cursor:pointer;text-align:center}
.asb:hover,.asb.sel{border-color:var(--border2);background:var(--bg3)}
/* CMS drag list */
.cms-list{margin-bottom:12px}
.cms-item{display:flex;align-items:center;gap:8px;padding:9px 11px;border:.5px solid var(--border);border-radius:var(--r);margin-bottom:5px;background:var(--bg2);cursor:default}
.cms-item.dragging{opacity:.4}
.cms-item.drag-over{border-color:var(--text);background:var(--bg3)}
.cms-drag{cursor:grab;color:var(--text3);font-size:14px;user-select:none;padding:0 4px}
.cms-name{font-size:13px;font-weight:500;color:var(--text);flex:1}
.cms-type{font-size:10px;color:var(--text3);background:var(--bg);padding:2px 7px;border-radius:8px;border:.5px solid var(--border)}
.cms-vis{font-size:11px;padding:3px 8px;border:.5px solid var(--border);border-radius:8px;background:var(--bg);cursor:pointer;color:var(--text2)}
.cms-vis.off{opacity:.5}
.cms-edit{font-size:11px;padding:3px 8px;border:.5px solid var(--border);border-radius:8px;background:var(--bg);cursor:pointer;color:var(--text2)}
.cms-del{font-size:11px;padding:3px 8px;border:.5px solid #fca5a5;border-radius:8px;background:var(--bg);cursor:pointer;color:#A32D2D}
/* section editor */
.sec-editor{border:.5px solid var(--border);border-radius:var(--r);padding:14px;background:var(--bg);margin-top:10px}
.sec-editor h3{font-size:13px;font-weight:500;color:var(--text);margin-bottom:12px}
/* card editor rows */
.card-row{border:.5px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:7px;background:var(--bg2);position:relative}
.card-row .rm{position:absolute;right:8px;top:8px;background:none;border:none;color:#A32D2D;cursor:pointer;font-size:14px}
/* table editor */
.tbl-head-row,.tbl-data-row{display:flex;gap:5px;margin-bottom:5px;align-items:center}
.tbl-head-row input,.tbl-data-row input{flex:1;padding:5px 7px;border:.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px;font-family:inherit}
footer{text-align:center;padding:26px 14px;font-size:12px;color:var(--text3)}
</style>
</head>
<body>

<header class="site-header">
  <div class="hdr">
    <h1 id="site-h1">ასტროლოგია ✦ ზოდიაქო</h1>
    <p id="site-sub">სტიქიები · ჯვრები · მმართველები</p>
  </div>
  <button class="admin-btn" onclick="openAdmin()">✎ რედაქტირება</button>
</header>

<nav class="tabs" id="nav-tabs"></nav>

<div class="wrap">
  <div id="pages-container"></div>
</div>

<footer id="site-footer">ასტროლოგიური ცნობარი · Georgian Astrology Guide</footer>

<!-- ADMIN -->
<div class="moverlay" id="adminModal">
<div class="modal">
  <div id="al">
    <div class="modal-h"><h2>🔐 ადმინ პანელი</h2><button class="mclose" onclick="closeAdmin()">✕</button></div>
    <div class="lbox">
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px">შეიყვანე პაროლი</p>
      <div style="position:relative;margin-bottom:10px">
        <input type="password" id="pw-inp" placeholder="პაროლი" onkeydown="if(event.key==='Enter')checkPw()" style="width:100%;padding:8px 36px 8px 10px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);font-size:14px">
        <button onclick="tglPw()" type="button" id="pw-eye" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:var(--text3)">👁</button>
      </div>
      <button class="sbtn" onclick="checkPw()">შესვლა</button>
      <p id="pw-err" style="font-size:12px;color:#A32D2D;margin-top:6px;display:none">პაროლი არასწორია</p>
    </div>
  </div>
  <div id="ap" style="display:none">
    <div class="modal-h"><h2>✎ CMS — სექციების მართვა</h2><button class="mclose" onclick="closeAdmin()">✕</button></div>
    <div class="atabs">
      <button class="atab on" onclick="aTab('pages',this)">📄 გვერდები</button>
      <button class="atab" onclick="aTab('site',this)">⚙️ საიტი</button>
    </div>

    <!-- PAGES TAB -->
    <div id="at-pages">
      <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">
        <button class="sbtn sec" onclick="addSection('article')" style="flex:1;min-width:120px">+ სტატია</button>
        <button class="sbtn sec" onclick="addSection('cards')" style="flex:1;min-width:120px">+ ბარათები</button>
        <button class="sbtn sec" onclick="addSection('signs')" style="flex:1;min-width:120px">+ ნიშნების სია</button>
        <button class="sbtn sec" onclick="addSection('table')" style="flex:1;min-width:120px">+ ცხრილი</button>
      </div>
      <div class="cms-list" id="cms-list"></div>
      <div id="sec-editor-wrap"></div>
    </div>

    <!-- SITE TAB -->
    <div id="at-site" style="display:none">
      <div class="fg"><label>სათაური (H1)</label><input type="text" id="es-h1"></div>
      <div class="fg"><label>ქვესათაური</label><input type="text" id="es-sub"></div>
      <div class="fg"><label>Footer</label><input type="text" id="es-footer"></div>
      <button class="sbtn" onclick="saveSite()">შენახვა <span class="svbadge" id="sv-site">✓</span></button>
      <div style="border-top:.5px solid var(--border);margin-top:16px;padding-top:16px">
        <div style="font-size:11px;font-weight:500;color:var(--text3);margin-bottom:12px">ბლოკების ჩვენება / დამალვა</div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:.5px solid var(--border);border-radius:var(--r);background:var(--bg2)">
          <div>
            <div style="font-size:13px;font-weight:500;color:var(--text)">სამეული</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">მაგ: "ვერძი იჭერს → კური აფიქსირებს → ტყუპები განავრცობს"</div>
          </div>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <span id="triad-status" style="font-size:12px;color:var(--text3)">ჩართული</span>
            <input type="checkbox" id="toggle-triad" style="width:16px;height:16px;cursor:pointer" onchange="saveTriadToggle(this)">
          </label>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
const PW='astro2026';
const EL={fire:{label:'ცეცხლი',bg:'var(--fire-bg)',tc:'var(--fire-tc)',bc:'var(--fire-bc)',hex:'#D85A30'},earth:{label:'მიწა',bg:'var(--earth-bg)',tc:'var(--earth-tc)',bc:'var(--earth-bc)',hex:'#639922'},air:{label:'ჰაერი',bg:'var(--air-bg)',tc:'var(--air-tc)',bc:'var(--air-bc)',hex:'#378ADD'},water:{label:'წყალი',bg:'var(--water-bg)',tc:'var(--water-tc)',bc:'var(--water-bc)',hex:'#7F77DD'}};
const CR={cardinal:'კარდინ.',fixed:'ფიქსირ.',mutable:'მუტაბ.'};
const ELC={fire:{label:'ცეცხლი',hex:'#D85A30',desc:'ენერგია, ინიციატივა, ვნება'},earth:{label:'მიწა',hex:'#639922',desc:'პრაქტიკულობა, სტაბილობა'},air:{label:'ჰაერი',hex:'#378ADD',desc:'გონება, კომუნიკაცია'},water:{label:'წყალი',hex:'#7F77DD',desc:'ემოცია, ინტუიცია, სიღრმე'}};
const CRC={cardinal:{label:'კარდინალური',hex:'#D85A30',desc:'ინიციატივა, ახლის დაწყება'},fixed:{label:'ფიქსირებული',hex:'#854F0B',desc:'გამძლეობა, სიმტკიცე'},mutable:{label:'მუტაბელური',hex:'#185FA5',desc:'ადაპტაცია, მოქნილობა'}};
const SIGN_OPTS=['♈ ვერძი','♉ კური','♊ ტყუპები','♋ კირჩხიბი','♌ ლომი','♍ ქალწული','♎ სასწორი','♏ მორიელი','♐ მშვილდ.','♑ თხის რქა','♒ მერწყ.','♓ თევზები'];
const SIGN_EL=['fire','earth','air','water','fire','earth','air','water','fire','earth','air','water'];
const SIGN_CR=['cardinal','fixed','mutable','cardinal','fixed','mutable','cardinal','fixed','mutable','cardinal','fixed','mutable'];

function ls(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function uid(){return 's'+Date.now()+Math.random().toString(36).slice(2,6);}
function badge(id){const b=document.getElementById(id);if(!b)return;b.style.display='inline';setTimeout(()=>b.style.display='none',2200);}

// ===== DEFAULT DATA =====
const DEF_SECTIONS=[
  {id:'s-signs',type:'signs',title:'12 ნიშანი',visible:true,tab:'12 ნიშანი',
   items:[

function renderSite(){
  document.getElementById('site-h1').textContent=SITE.h1;
  document.getElementById('site-sub').textContent=SITE.sub;
  document.getElementById('site-footer').textContent=SITE.footer;
  document.getElementById('site-title-tag').textContent=SITE.h1;
}

function renderAll(){
  renderSite();
  const tabs=document.getElementById('nav-tabs');
  const pages=document.getElementById('pages-container');
  tabs.innerHTML='';pages.innerHTML='';
  const visible=SECTIONS.filter(s=>s.visible!==false);
  visible.forEach((sec,i)=>{
    // tab
    const btn=document.createElement('button');
    btn.className='tab'+(i===0?' on':'');
    btn.textContent=sec.tab||sec.title;
    btn.onclick=()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById('pg-'+sec.id).classList.add('on');
    };
    tabs.appendChild(btn);
    // page
    const div=document.createElement('div');
    div.className='page'+(i===0?' on':'');
    div.id='pg-'+sec.id;
    div.innerHTML=renderSection(sec);
    pages.appendChild(div);
    // bind events
    bindSectionEvents(sec,div);
  });
}

function renderSection(sec){
  if(sec.type==='signs')return renderSignsSection(sec);
  if(sec.type==='cards')return renderCardsSection(sec);
  if(sec.type==='table')return renderTableSection(sec);
  if(sec.type==='calc')return renderCalcSection(sec);
  if(sec.type==='article')return renderArticleSection(sec);
  if(sec.type==='venus')return renderVenusSection(sec);
  if(sec.type==='mars')return renderMarsSection(sec);
  return '';
}

function renderSignsSection(sec){
  const lower=(sec.items||[]).filter(s=>s.hier==='lower');
  const upper=(sec.items||[]).filter(s=>s.hier==='upper');
  let h='';
  if(sec.intro)h+=`<div style="border:.5px solid var(--border);border-radius:14px;padding:18px 20px;background:var(--bg);margin-bottom:18px;font-size:14px;color:var(--text2);line-height:1.7">${sec.intro}</div>`;
  const renderGroup=(items,label)=>{
    let g=`<p class="hier-lbl">${label}</p><div class="cards-grid">`;
    items.forEach((s,i)=>{
      const idx=(sec.items||[]).indexOf(s);
      const e=EL[s.el]||EL.fire;
      g+=`<div class="scard" id="sc-${sec.id}-${idx}" onclick="toggleSignCard('${sec.id}',${idx})">

function doCalc(secId){
  const sec=SECTIONS.find(s=>s.id===secId);
  const planets=sec.planets||[];
  const el={fire:0,earth:0,air:0,water:0};const cr={cardinal:0,fixed:0,mutable:0};let tot=0;
  planets.forEach((p,i)=>{
    const v=parseInt(document.getElementById('csel-'+secId+'-'+i).value);
    if(v<0)return;
    el[SIGN_EL[v]]+=p.pts;cr[SIGN_CR[v]]+=p.pts;tot+=p.pts;
  });
  if(!tot){alert('სულ მცირე ერთი ნიშანი');return;}
  const ea=Object.entries(el).sort((a,b)=>b[1]-a[1]);
  const ca=Object.entries(cr).sort((a,b)=>b[1]-a[1]);
  const de=ELC[ea[0][0]];const dc=CRC[ca[0][0]];
  let h='<div style="font-size:11px;font-weight:500;color:var(--text3);margin-bottom:10px">სტიქიები</div>';
  ea.forEach(([k,v])=>{const m=ELC[k];const p=Math.round(v/tot*100);h+=`<div class="srow"><span style="font-size:13px;font-weight:500;color:var(--text);width:80px">${m.label}</span><div style="flex:1"><div class="bwrap"><div class="bfill" style="width:${p}%;background:${m.hex}"></div></div></div><span style="font-size:13px;font-weight:500;width:26px;text-align:right">${v}</span><span style="font-size:11px;color:var(--text3);width:32px;text-align:right">${p}%</span></div>`;});
  h+='<div style="font-size:11px;font-weight:500;color:var(--text3);margin:12px 0 9px">ჯვრები</div>';
  ca.forEach(([k,v])=>{const m=CRC[k];const p=Math.round(v/tot*100);h+=`<div class="srow"><span style="font-size:13px;font-weight:500;color:var(--text);width:100px">${m.label}</span><div style="flex:1"><div class="bwrap"><div class="bfill" style="width:${p}%;background:${m.hex}"></div></div></div><span style="font-size:13px;font-weight:500;width:26px;text-align:right">${v}</span><span style="font-size:11px;color:var(--text3);width:32px;text-align:right">${p}%</span></div>`;});
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0 7px"><div class="rcard"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">დომ. სტიქია</div><div style="font-size:20px;font-weight:500;color:${de.hex}">${de.label}</div></div><div class="rcard"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">დომ. ჯვარი</div><div style="font-size:20px;font-weight:500;color:${dc.hex}">${dc.label}</div></div></div>
  <div class="ins" style="border-color:${de.hex};background:var(--bg2);color:var(--text2)"><strong style="color:${de.hex}">${de.label}+${dc.label}:</strong> ${de.desc}. ${dc.desc}.</div>`;

// CMS LIST
function renderCmsList(){
  const c=document.getElementById('cms-list');c.innerHTML='';
  SECTIONS.forEach((sec,i)=>{
    const div=document.createElement('div');
    div.className='cms-item';div.draggable=true;div.dataset.idx=i;
    div.ondragstart=e=>{dragSrc=i;div.classList.add('dragging');e.dataTransfer.effectAllowed='move';};
    div.ondragend=()=>{document.querySelectorAll('.cms-item').forEach(d=>{d.classList.remove('dragging','drag-over');});};
    div.ondragover=e=>{e.preventDefault();div.classList.add('drag-over');};
    div.ondragleave=()=>div.classList.remove('drag-over');
    div.ondrop=e=>{e.preventDefault();div.classList.remove('drag-over');if(dragSrc===null||dragSrc===i)return;const moved=SECTIONS.splice(dragSrc,1)[0];SECTIONS.splice(i,0,moved);dragSrc=null;lss('as_sections',SECTIONS);renderCmsList();renderAll();};
    const typeLabel={signs:'ნიშნები',cards:'ბარათები',table:'ცხრილი',calc:'კალკ.',article:'სტატია'}[sec.type]||sec.type;
    div.innerHTML=`<span class="cms-drag">⠿</span>
      <span class="cms-name">${sec.title}</span>
      <span class="cms-type">${typeLabel}</span>
      <button class="cms-vis${sec.visible===false?' off':''}" onclick="toggleVis(${i})" title="ჩვენება/დამალვა">${sec.visible===false?'👁‍🗨':'👁'}</button>
      <button class="cms-edit" onclick="openEditor(${i})">✎</button>
      <button class="cms-del" onclick="deleteSection(${i})">✕</button>`;
    c.appendChild(div);
  });
}

function toggleVis(i){SECTIONS[i].visible=SECTIONS[i].visible===false?true:false;lss('as_sections',SECTIONS);renderCmsList();renderAll();}
function deleteSection(i){if(!confirm('წაიშალოს?'))return;SECTIONS.splice(i,1);lss('as_sections',SECTIONS);renderCmsList();renderAll();document.getElementById('sec-editor-wrap').innerHTML='';}

function addSection(type){
  const sec={id:uid(),type,title:'ახალი '+type,visible:true,tab:'ახალი'};
  if(type==='cards')sec.items=[{title:'ბარათი 1',sub:'',desc:'',accent:'#378ADD'}];
  if(type==='signs')sec.items=JSON.parse(JSON.stringify(DEF_SECTIONS[0].items));
  if(type==='article')sec.content='ტექსტი...';
  if(type==='table'){sec.headers=['სვეტი 1','სვეტი 2'];sec.rows=[['',''],['','']];}
  if(type==='calc')sec.planets=JSON.parse(JSON.stringify(DEF_SECTIONS[4].planets));
  SECTIONS.push(sec);lss('as_sections',SECTIONS);renderCmsList();renderAll();openEditor(SECTIONS.length-1);
}

function openEditor(i){

  const sec=SECTIONS[i];
  const w=document.getElementById('sec-editor-wrap');
  let h=`<div class="sec-editor"><h3>✎ ${sec.title} (${sec.type})</h3>
    <div class="g2">
      <div class="fg"><label>სათაური</label><input type="text" id="ed-title" value="${sec.title}"></div>
      <div class="fg"><label>ჩანართის სახელი</label><input type="text" id="ed-tab" value="${sec.tab||sec.title}"></div>
    </div>`;

  if(sec.type==='article'){
    h+=`<div class="fg"><label>ტექსტი</label><textarea id="ed-content" rows="6">${sec.content||''}</textarea></div>`;
  }
  if(sec.type==='cards'){
    h+=`<div style="font-size:11px;font-weight:500;color:var(--text3);margin-bottom:8px">ბარათები</div><div id="cards-editor">`;
    (sec.items||[]).forEach((c,ci)=>{
      h+=`<div class="card-row"><button class="rm" onclick="removeCard(${ci})">✕</button>
        <div class="g2"><div class="fg"><label>სათაური</label><input type="text" id="ct-${ci}" value="${c.title||''}"></div>
        <div class="fg"><label>ფერი</label><input type="color" id="cc-${ci}" value="${c.accent||'#378ADD'}" style="padding:2px;height:34px"></div></div>
        <div class="fg"><label>ქვესათაური</label><input type="text" id="cs-${ci}" value="${c.sub||''}"></div>
        <div class="fg"><label>ტექსტი</label><textarea id="cd-${ci}" rows="2">${c.desc||''}</textarea></div></div>`;
    });
    h+=`</div><button class="sbtn sec" onclick="addCard()" style="margin-bottom:10px">+ ბარათი</button>`;
  }
  if(sec.type==='table'){
    h+=`<div style="font-size:11px;font-weight:500;color:var(--text3);margin-bottom:7px">სვეტების სათაური (tab-ით გამოყოფე)</div>
      <div class="fg"><input type="text" id="tbl-headers" value="${(sec.headers||[]).join('\t')}"></div>
      <div style="font-size:11px;font-weight:500;color:var(--text3);margin-bottom:7px">მწკრივები (ერთი მწკრივი = ერთი ხაზი, სვეტები tab-ით)</div>
      <div class="fg"><textarea id="tbl-rows" rows="8">${(sec.rows||[]).map(r=>r.join('\t')).join('\n')}</textarea></div>`;
  }
  if(sec.type==='calc'){
    h+=`<div style="font-size:11px;font-weight:500;color:var(--text3);margin-bottom:8px">პლანეტების ქულები</div>`;
    (sec.planets||[]).forEach((p,pi)=>{
      h+=`<div class="prow2"><span class="psym">${p.sym}</span><span class="pname">${p.name}</span><input type="number" id="pp-${pi}" value="${p.pts}" min="0" max="20" style="width:60px;padding:4px 8px;border:.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;text-align:center"><span class="ppts">ქ.</span></div>`;
    });
  }
  if(sec.type==='signs'){
    h+=`<div style="font-size:11px;color:var(--text3);margin-bottom:8px">ნიშნების სია — ინდივიდ. დასარედაქტ. შეინახე და გახსენი ნიშანი</div>
      <div class="fg"><label>შესავალი ტექსტი (სურვ.)</label><textarea id="ed-intro" rows="3">${sec.intro||''}</textarea></div>`;
    (sec.items||[]).forEach((s,si)=>{
      h+=`<details style="border:.5px solid var(--border);border-radius:var(--r);margin-bottom:5px"><summary style="padding:9px 12px;cursor:pointer;font-size:13px;font-weight:500">${s.sym} ${s.n}</summary>
        <div style="padding:10px 12px">
          <div class="g2">
            <div class="fg"><label>სახელი</label><input type="text" id="sn-${si}" value="${s.n}"></div>
            <div class="fg"><label>სიმბოლო</label><input type="text" id="ss-${si}" value="${s.sym}" style="font-size:18px;text-align:center"></div>

            <div class="fg"><label>სტიქია</label><select id="sel-${si}"><option value="fire"${s.el==='fire'?' selected':''}>ცეცხლი</option><option value="earth"${s.el==='earth'?' selected':''}>მიწა</option><option value="air"${s.el==='air'?' selected':''}>ჰაერი</option><option value="water"${s.el==='water'?' selected':''}>წყალი</option></select></div>
            <div class="fg"><label>ჯვარი</label><select id="scr-${si}"><option value="cardinal"${s.cr==='cardinal'?' selected':''}>კარდ.</option><option value="fixed"${s.cr==='fixed'?' selected':''}>ფიქსირ.</option><option value="mutable"${s.cr==='mutable'?' selected':''}>მუტაბ.</option></select></div>
            <div class="fg"><label>იერარქია</label><select id="sh-${si}"><option value="lower"${s.hier==='lower'?' selected':''}>ქვედა</option><option value="upper"${s.hier==='upper'?' selected':''}>ზედა</option></select></div>
          </div>
          <div class="fg"><label>მმართველი</label><input type="text" id="sr-${si}" value="${s.ruler||''}"></div>
          <div class="fg"><label>იმპულსი</label><input type="text" id="si-${si}" value="${s.impulse||''}"></div>
          <div class="fg"><label>საკვანძო სიტყვები (მძიმით)</label><input type="text" id="sk-${si}" value="${(s.keywords||[]).join(', ')}"></div>
          <div class="fg"><label>განმარტება</label><textarea id="sd-${si}" rows="3">${s.desc||''}</textarea></div>
          <div class="fg"><label>სამეული</label><input type="text" id="st-${si}" value="${s.triad||''}"></div>
          <div class="fg"><label>საპირისპირო</label><input type="text" id="so-${si}" value="${s.opp||''}"></div>
        </div></details>`;
    });
  }
  h+=`<button class="sbtn" onclick="saveEditor()" style="margin-top:8px">შენახვა <span class="svbadge" id="sv-ed">✓</span></button></div>`;
  w.innerHTML=h;
  w.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function addCard(){
  const i=SECTIONS.findIndex(s=>s.id===editSecId);
  SECTIONS[i].items.push({title:'ახალი ბარათი',sub:'',desc:'',accent:'#378ADD'});
  openEditor(i);
}
function removeCard(ci){
  const i=SECTIONS.findIndex(s=>s.id===editSecId);
  SECTIONS[i].items.splice(ci,1);openEditor(i);
}

function saveEditor(){
  const i=SECTIONS.findIndex(s=>s.id===editSecId);
  const sec=SECTIONS[i];
  sec.title=document.getElementById('ed-title').value;
  sec.tab=document.getElementById('ed-tab').value;
  if(sec.type==='article'){sec.content=document.getElementById('ed-content').value;}
  if(sec.type==='cards'){
    sec.items=(sec.items||[]).map((c,ci)=>({
      title:document.getElementById('ct-'+ci).value,
      sub:document.getElementById('cs-'+ci).value,
      desc:document.getElementById('cd-'+ci).value,
      accent:document.getElementById('cc-'+ci).value,
    }));
  }
  if(sec.type==='table'){
    sec.headers=document.getElementById('tbl-headers').value.split('\t');
    sec.rows=document.getElementById('tbl-rows').value.split('\n').filter(r=>r.trim()).map(r=>r.split('\t'));
  }
  if(sec.type==='calc'){
    (sec.planets||[]).forEach((p,pi)=>{p.pts=parseInt(document.getElementById('pp-'+pi).value)||0;});
  }
  if(sec.type==='signs'){
    sec.intro=document.getElementById('ed-intro')?.value||'';
    (sec.items||[]).forEach((s,si)=>{
      s.n=document.getElementById('sn-'+si)?.value||s.n;
      s.sym=document.getElementById('ss-'+si)?.value||s.sym;
      s.el=document.getElementById('sel-'+si)?.value||s.el;
      s.cr=document.getElementById('scr-'+si)?.value||s.cr;
      s.hier=document.getElementById('sh-'+si)?.value||s.hier;
      s.ruler=document.getElementById('sr-'+si)?.value||'';
      s.impulse=document.getElementById('si-'+si)?.value||'';
      s.keywords=(document.getElementById('sk-'+si)?.value||'').split(',').map(k=>k.trim()).filter(Boolean);
      s.desc=document.getElementById('sd-'+si)?.value||'';
      s.triad=document.getElementById('st-'+si)?.value||'';
      s.opp=document.getElementById('so-'+si)?.value||'';
    });
  }
  lss('as_sections',SECTIONS);renderCmsList();renderAll();badge('sv-ed');
}

// GMT CALCULATOR
function calcGMT(){
  const dateVal=document.getElementById('tz-date')?.value;
  const timeVal=document.getElementById('tz-time')?.value||'12:00';
  if(!dateVal){const r=document.getElementById('gmt-result');if(r)r.style.display='none';return;}
  const y=parseInt(dateVal.slice(0,4)),m=parseInt(dateVal.slice(5,7)),d=parseInt(dateVal.slice(8,10));
  const h=parseInt(timeVal.slice(0,2)),min=parseInt(timeVal.slice(3,5));
  let gmt=null,note='';
  const md=d*100+m;
  if(y<1924){gmt=null;note='1924 წლამდე მონაცემი არ არის';}
  else if(y<1957){gmt=3;note='1924–1957: GMT+3';}
  else if(y<1981){gmt=4;note='1957–1981: GMT+4';}
  else if(y<=1990){
    const ss={1981:[331,930],1982:[331,930],1983:[331,930],1984:[331,929],1985:[330,928],1986:[329,927],1987:[328,926],1988:[326,923],1989:[325,923],1990:[324,929]};
    const s=ss[y];
    if(s&&md>=s[0]&&md<=s[1]){gmt=5;note=y+': ზაფხული GMT+5';}
    else{gmt=4;note=y+': ზამთარი GMT+4';}
  }
  else if(y===1991){if(md<=929){gmt=4;note='1991: 29 სექტ.-მდე GMT+4';}else{gmt=3;note='1991: 29 სექტ.-ის შემდეგ GMT+3';}}
  else if(y===1992){if(md>=328&&md<=926){gmt=4;note='1992: 28 მარ.–26 სექტ. GMT+4';}else{gmt=3;note='1992: სხვა GMT+3';}}
  else if(y===1993){if(md>=327&&md<=925){gmt=4;note='1993: 27 მარ.–25 სექტ. GMT+4';}else{gmt=3;note='1993: სხვა GMT+3';}}
  else if(y===1994){gmt=4;note='1994: მთელი წელი GMT+4';}
  else if(y===1995){if(md>=325&&md<=923){gmt=5;note='1995: 25 მარ.–23 სექტ. GMT+5';}else{gmt=4;note='1995: სხვა GMT+4';}}
  else if(y===1996){if(md<330){gmt=4;note='1996: 30 მარტამდე GMT+4';}else{gmt=5;note='1996: 30 მარტის შემდეგ GMT+5';}}
  else if(y===1997){if(md<=1025){gmt=5;note='1997: 25 ოქტ.-მდე GMT+5';}else{gmt=4;note='1997: 25 ოქტ.-ის შემდეგ GMT+4';}}
  else if(y===1998){if(md>=328&&md<=1024){gmt=5;note='1998: 28 მარ.–24 ოქტ. GMT+5';}else{gmt=4;note='1998: სხვა GMT+4';}}
  else if(y===1999){if(md>=327&&md<=1030){gmt=5;note='1999: 27 მარ.–30 ოქტ. GMT+5';}else{gmt=4;note='1999: სხვა GMT+4';}}
  else if(y===2000){if(md>=325&&md<=1028){gmt=5;note='2000: 25 მარ.–28 ოქტ. GMT+5';}else{gmt=4;note='2000: სხვა GMT+4';}}
  else if(y===2001){if(md>=324&&md<=1027){gmt=5;note='2001: 24 მარ.–27 ოქტ. GMT+5';}else{gmt=4;note='2001: სხვა GMT+4';}}
  else if(y===2002){if(md>=330&&md<=1026){gmt=5;note='2002: 30 მარ.–26 ოქტ. GMT+5';}else{gmt=4;note='2002: სხვა GMT+4';}}
  else if(y===2003){if(md>=329&&md<=1025){gmt=5;note='2003: 29 მარ.–25 ოქტ. GMT+5';}else{gmt=4;note='2003: სხვა GMT+4';}}
  else if(y===2004){
    if(md<327){gmt=4;note='2004: 27 მარტამდე GMT+4';}
    else if(md<626){gmt=5;note='2004: 27 მარ.–26 ივნ. GMT+5';}
    else if(md<=1030){gmt=4;note='2004: 26 ივნ.–30 ოქტ. GMT+4';}
    else{gmt=3;note='2004: 30 ოქტ.-ის შემდეგ GMT+3';}
  }
  else if(y===2005){if(md<326){gmt=3;note='2005: 26 მარტამდე GMT+3';}else{gmt=4;note='2005: 26 მარტის შემდეგ GMT+4';}}
  else{gmt=4;note='2005 წლის შემდეგ: GMT+4 (მუდმივი)';}
  const res=document.getElementById('gmt-result');
  if(!res)return;
  if(gmt===null){
    res.innerHTML=`<div style="padding:14px;border-radius:10px;background:#FEF9C3;border:.5px solid #D4A017;color:#7a5c00;font-size:14px">${note}</div>`;
  }else{
    const ts=timeVal?` ${h.toString().padStart(2,'0')}:${min.toString().padStart(2,'0')}`:'';
    res.innerHTML=`<div style="padding:16px;border-radius:10px;background:#DBEAFE;border:.5px solid #1a5fb4">
      <div style="font-size:32px;font-weight:500;color:#1e3a6e;margin-bottom:6px">GMT+${gmt}</div>
      <div style="font-size:13px;color:#1e3a6e;margin-bottom:4px">${d.toString().padStart(2,'0')}.${m.toString().padStart(2,'0')}.${y}${ts}</div>
      <div style="font-size:12px;color:#1e3a6e;opacity:.8;margin-bottom:8px">${note}</div>
      <div style="padding:8px 12px;background:rgba(255,255,255,.5);border-radius:8px;font-size:12px;color:#1e3a6e">
        <strong>ასტრო-პროგრამისთვის:</strong> UTC+${gmt} / GMT+${gmt}
      </div>
    </div>`;
  }
  res.style.display='block';
}
